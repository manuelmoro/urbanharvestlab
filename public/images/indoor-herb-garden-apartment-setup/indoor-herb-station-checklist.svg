  <text x="180" y="146" fill="#2B3B32" font-family="Arial, sans-serif" font-size="56" font-weight="700">Indoor herb station checklist</text>
  <text x="180" y="748" fill="#5A6B52" font-family="Arial, sans-serif" font-size="34">Drainage, spacing, and quick observation habits matter as much as the herb list.</text>
  <text x="280" y="614" fill="#6A4B39" font-family="Arial, sans-serif" font-size="34" font-weight="700">Tray and drainage</text>
  <text x="280" y="652" fill="#6A4B39" font-family="Arial, sans-serif" font-size="28">Catch runoff without leaving roots waterlogged</text>
  <text x="692" y="614" fill="#6A4B39" font-family="Arial, sans-serif" font-size="34" font-weight="700">Rotation and spacing</text>
  <text x="692" y="652" fill="#6A4B39" font-family="Arial, sans-serif" font-size="28">Keep leaves in the light and avoid crowding</text>
  <text x="1090" y="614" fill="#6A4B39" font-family="Arial, sans-serif" font-size="34" font-weight="700">Daily visibility</text>
  <text x="1090" y="652" fill="#6A4B39" font-family="Arial, sans-serif" font-size="28">Place herbs where you naturally notice them</text>
