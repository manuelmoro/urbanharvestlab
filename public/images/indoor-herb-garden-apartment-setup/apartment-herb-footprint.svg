  <text x="140" y="146" fill="#2B3B32" font-family="Arial, sans-serif" font-size="56" font-weight="700">Apartment herb footprint</text>
  <text x="140" y="748" fill="#5A6B52" font-family="Arial, sans-serif" font-size="34">A single dedicated station is easier to read than herbs scattered around the home.</text>
