  <text x="150" y="150" fill="#2B3B32" font-family="Arial, sans-serif" font-size="56" font-weight="700">Balcony herb routine</text>
  <text x="150" y="748" fill="#5A6B52" font-family="Arial, sans-serif" font-size="34">A balcony setup stays calmer when the routine is short, visible, and repeatable.</text>
  <text x="214" y="560" fill="#355045" font-family="Arial, sans-serif" font-size="34" font-weight="700">Check moisture</text>
  <text x="190" y="604" fill="#355045" font-family="Arial, sans-serif" font-size="28">Look at the root zone, not</text>
  <text x="208" y="640" fill="#355045" font-family="Arial, sans-serif" font-size="28">just the dry surface.</text>
  <text x="684" y="560" fill="#6A4B39" font-family="Arial, sans-serif" font-size="34" font-weight="700">Harvest lightly</text>
  <text x="664" y="604" fill="#6A4B39" font-family="Arial, sans-serif" font-size="28">Small, regular cuts keep</text>
  <text x="676" y="640" fill="#6A4B39" font-family="Arial, sans-serif" font-size="28">plants branching well.</text>
  <text x="1142" y="560" fill="#355045" font-family="Arial, sans-serif" font-size="34" font-weight="700">Reset the layout</text>
  <text x="1140" y="604" fill="#355045" font-family="Arial, sans-serif" font-size="28">Rotate or shift pots when</text>
  <text x="1150" y="640" fill="#355045" font-family="Arial, sans-serif" font-size="28">one zone runs hotter.</text>
