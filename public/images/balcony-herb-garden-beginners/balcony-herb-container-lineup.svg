  <text x="140" y="146" fill="#2B3B32" font-family="Arial, sans-serif" font-size="56" font-weight="700">Beginner balcony container lineup</text>
  <text x="140" y="748" fill="#5A6B52" font-family="Arial, sans-serif" font-size="34">Use a few medium containers with clear roles instead of many tiny pots.</text>
  <text x="240" y="650" fill="#5B3F31" font-family="Arial, sans-serif" font-size="28" font-weight="700">Mint solo pot</text>
  <text x="478" y="650" fill="#5B3F31" font-family="Arial, sans-serif" font-size="28" font-weight="700">Parsley</text>
  <text x="760" y="650" fill="#5B3F31" font-family="Arial, sans-serif" font-size="28" font-weight="700">Basil</text>
  <text x="1012" y="650" fill="#5B3F31" font-family="Arial, sans-serif" font-size="28" font-weight="700">Chives</text>
  <text x="1280" y="650" fill="#5B3F31" font-family="Arial, sans-serif" font-size="28" font-weight="700">Thyme or oregano</text>
  <text x="196" y="286" fill="#6D5A46" font-family="Arial, sans-serif" font-size="30">Separate the fastest spreader.</text>
  <text x="490" y="286" fill="#6D5A46" font-family="Arial, sans-serif" font-size="30">Keep leafy herbs accessible.</text>
  <text x="762" y="286" fill="#6D5A46" font-family="Arial, sans-serif" font-size="30">Reserve the strongest light for basil.</text>
